<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Hasan Live Sender · Receiver</title>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
  </script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js">
  </script>
  <style>
    /* ----- reset & base ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      background: #0b0d15;
      color: #eef2ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background-image: radial-gradient(circle at 20% 30%, #1a2639 0%, #0b0d15 80%);
    }

    /* ----- glass container ----- */
    .glass-container {
      max-width: 1300px;
      width: 100%;
      background: rgba(18, 26, 40, 0.45);
      backdrop-filter: blur(14px) saturate(180%);
      -webkit-backdrop-filter: blur(14px) saturate(180%);
      border-radius: 3rem;
      padding: 2rem 2.2rem;
      box-shadow: 0 20px 50px rgba(0, 10, 30, 0.7), inset 0 1px 2px rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(64, 164, 255, 0.15);
      transition: all 0.2s ease;
    }

    /* ----- header ----- */
    .app-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem 1.5rem;
      margin-bottom: 2rem;
    }

    .app-title h1 {
      font-weight: 600;
      font-size: 1.9rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #b6dcff, #4ba9ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .app-title h1 small {
      font-size: 1rem;
      background: rgba(0, 180, 255, 0.15);
      padding: 0.2rem 1rem;
      border-radius: 40px;
      color: #8ccbff;
      border: 1px solid rgba(0, 180, 255, 0.2);
      -webkit-text-fill-color: #8ccbff;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(0, 20, 40, 0.6);
      padding: 0.4rem 1.2rem;
      border-radius: 60px;
      border: 1px solid rgba(100, 200, 255, 0.2);
      font-size: 0.9rem;
      font-weight: 500;
      backdrop-filter: blur(4px);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      background: #34d399;
      box-shadow: 0 0 8px #34d399aa;
      transition: 0.2s;
    }

    .status-dot.offline {
      background: #f87171;
      box-shadow: 0 0 8px #f87171aa;
    }

    /* ----- grid ----- */
    .split-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-top: 0.5rem;
    }

    @media (max-width: 800px) {
      .split-grid {
        grid-template-columns: 1fr;
        gap: 2.5rem;
      }
      .glass-container {
        padding: 1.5rem 1.2rem;
      }
    }

    /* ----- cards ----- */
    .card {
      background: rgba(8, 16, 30, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 2rem;
      padding: 1.8rem 1.8rem 2rem;
      border: 1px solid rgba(70, 150, 255, 0.15);
      box-shadow: 0 12px 30px -8px rgba(0, 0, 0, 0.6);
      transition: 0.2s;
    }

    .card h2 {
      font-weight: 500;
      font-size: 1.4rem;
      margin-bottom: 1.6rem;
      color: #d6eaff;
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .card h2 span {
      background: rgba(0, 150, 255, 0.15);
      padding: 0.1rem 0.7rem;
      border-radius: 40px;
      font-size: 0.75rem;
      color: #7bb9ff;
    }

    /* ----- form ----- */
    .form-group {
      margin-bottom: 1.3rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      color: #a6c3e6;
      margin-bottom: 0.3rem;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(0, 10, 25, 0.5);
      border: 1px solid rgba(80, 170, 255, 0.2);
      border-radius: 1.2rem;
      color: #f0f7ff;
      font-size: 0.95rem;
      outline: none;
      transition: 0.2s;
      backdrop-filter: blur(4px);
    }

    .form-group input:focus {
      border-color: #4ba9ff;
      box-shadow: 0 0 0 3px rgba(75, 169, 255, 0.25);
      background: rgba(10, 25, 50, 0.6);
    }

    .form-group input::placeholder {
      color: #5b7399;
      font-weight: 300;
    }

    /* ----- upload zone ----- */
    .upload-zone {
      border: 2px dashed rgba(75, 169, 255, 0.3);
      border-radius: 1.8rem;
      padding: 1.6rem 0.5rem;
      text-align: center;
      background: rgba(0, 30, 60, 0.2);
      transition: 0.2s;
      cursor: pointer;
      position: relative;
      margin: 0.5rem 0 0.8rem;
    }

    .upload-zone.dragover {
      border-color: #4ba9ff;
      background: rgba(0, 80, 180, 0.15);
      box-shadow: inset 0 0 20px rgba(0, 150, 255, 0.1);
    }

    .upload-zone p {
      color: #8bb0da;
      font-size: 0.9rem;
      pointer-events: none;
    }

    .upload-zone .icon-upload {
      font-size: 2rem;
      display: block;
      margin-bottom: 0.2rem;
    }

    .upload-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .image-preview-wrapper {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin: 0.8rem 0 0.2rem;
    }

    .preview-img {
      max-width: 100px;
      max-height: 100px;
      border-radius: 1.2rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      object-fit: cover;
      background: #0a1422;
    }

    .btn-remove-img {
      background: rgba(255, 70, 70, 0.15);
      border: none;
      color: #ff8a8a;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
      border: 1px solid rgba(255, 80, 80, 0.2);
    }

    .btn-remove-img:hover {
      background: rgba(255, 70, 70, 0.25);
    }

    /* ----- buttons ----- */
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.7rem;
      margin-top: 1.2rem;
    }

    .btn {
      padding: 0.7rem 1.8rem;
      border-radius: 60px;
      border: none;
      font-weight: 600;
      font-size: 0.9rem;
      background: rgba(30, 80, 140, 0.3);
      color: #d0e6ff;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(75, 169, 255, 0.2);
      cursor: pointer;
      transition: 0.2s;
      flex: 1 1 auto;
      min-width: 100px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .btn-primary {
      background: linear-gradient(135deg, #0f6fcf, #1a8aff);
      border: none;
      color: white;
      box-shadow: 0 8px 18px -8px #1a8aff60;
    }

    .btn-primary:hover {
      transform: scale(1.02);
      box-shadow: 0 10px 24px -6px #1a8affaa;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      transform: scale(0.98);
      pointer-events: none;
    }

    .btn-secondary {
      background: rgba(40, 70, 120, 0.3);
      border-color: rgba(100, 180, 255, 0.15);
    }

    .btn-secondary:hover {
      background: rgba(40, 80, 150, 0.4);
    }

    .btn-danger {
      background: rgba(200, 50, 50, 0.15);
      border-color: rgba(255, 80, 80, 0.15);
      color: #ff9b9b;
    }

    .btn-danger:hover {
      background: rgba(200, 50, 50, 0.25);
    }

    /* ----- receiver data ----- */
    .receiver-data {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .data-row {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0.2rem;
      border-bottom: 1px solid rgba(100, 180, 255, 0.05);
      font-size: 0.95rem;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .data-row .label {
      color: #89b0da;
      font-weight: 400;
      letter-spacing: 0.02em;
    }

    .data-row .value {
      font-weight: 500;
      word-break: break-word;
      color: #e3efff;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .copy-btn {
      background: rgba(255, 255, 255, 0.04);
      border: none;
      color: #7bb9ff;
      padding: 0.2rem 0.7rem;
      border-radius: 30px;
      font-size: 0.65rem;
      cursor: pointer;
      border: 1px solid rgba(100, 180, 255, 0.1);
      transition: 0.15s;
    }

    .copy-btn:hover {
      background: rgba(75, 169, 255, 0.15);
    }

    .receiver-image {
      margin: 0.8rem 0 0.2rem;
    }

    .receiver-image img {
      max-width: 100%;
      max-height: 200px;
      border-radius: 1.4rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
      cursor: pointer;
      transition: 0.15s;
      background: #0e1a2a;
    }

    .receiver-image img:hover {
      filter: brightness(1.1);
    }

    .status-pill {
      background: rgba(52, 211, 153, 0.15);
      color: #5ee6b0;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-size: 0.7rem;
      border: 1px solid rgba(52, 211, 153, 0.2);
    }

    .time-stamp {
      font-size: 0.75rem;
      color: #6f8fb3;
    }

    /* ----- toast ----- */
    .toast-container {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 999;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      max-width: 320px;
      width: 100%;
    }

    .toast {
      background: rgba(10, 26, 48, 0.9);
      backdrop-filter: blur(12px);
      padding: 0.8rem 1.4rem;
      border-radius: 2rem;
      border-left: 6px solid #4ba9ff;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
      color: #dceaff;
      font-size: 0.9rem;
      animation: slideUp 0.3s ease;
    }

    .toast.success {
      border-left-color: #34d399;
    }
    .toast.error {
      border-left-color: #f87171;
    }

    @keyframes slideUp {
      0% {
        opacity: 0;
        transform: translateY(20px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ----- flash animation ----- */
    .highlight-flash {
      animation: flashCard 0.5s ease 2;
    }

    @keyframes flashCard {
      0%,
      100% {
        background: rgba(8, 16, 30, 0.5);
      }
      50% {
        background: rgba(20, 80, 160, 0.25);
        border-color: #4ba9ff;
      }
    }

    /* ----- fullscreen overlay ----- */
    .fullscreen-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 2rem;
      opacity: 0;
      pointer-events: none;
      transition: 0.25s;
    }

    .fullscreen-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .fullscreen-overlay img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 2rem;
      box-shadow: 0 20px 50px black;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .fullscreen-overlay .close-fs {
      position: absolute;
      top: 2rem;
      right: 2.5rem;
      background: rgba(255, 255, 255, 0.05);
      border: none;
      color: white;
      font-size: 2.5rem;
      cursor: pointer;
      backdrop-filter: blur(4px);
      border-radius: 60px;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .fullscreen-overlay .close-fs:hover {
      background: rgba(255, 70, 70, 0.15);
    }

    @media (max-width: 480px) {
      .glass-container {
        padding: 1rem;
      }
      .card {
        padding: 1.2rem;
      }
      .btn {
        min-width: 70px;
        font-size: 0.8rem;
        padding: 0.6rem 1rem;
      }
    }
  </style>
</head>
<body>

  <div class="glass-container" id="appContainer">
    <!-- header -->
    <div class="app-title">
      <h1>📡 Hasan <small>Live Sender</small></h1>
      <div class="status-badge">
        <span class="status-dot" id="connectionDot"></span>
        <span id="connectionLabel">online</span>
      </div>
    </div>

    <!-- split sender / receiver -->
    <div class="split-grid">

      <!-- SENDER -->
      <div class="card" id="senderCard">
        <h2>📤 Sender <span>push data</span></h2>
        <form id="senderForm" autocomplete="off">
          <div class="form-group">
            <label>📱 Mobile number</label>
            <input type="tel" id="mobileInput" placeholder="+880 1700 000 000" required />
          </div>
          <div class="form-group">
            <label>🔢 Application number</label>
            <input type="text" id="applicationInput" placeholder="APP-2026-001" required />
          </div>
          <div class="form-group">
            <label>📅 DOB</label>
            <input type="date" id="dobInput" required />
          </div>
          <div class="form-group">
            <label>🔑 Password</label>
            <input type="password" id="passwordInput" placeholder="••••••••" required />
          </div>

          <!-- image upload -->
          <div class="form-group">
            <label>🖼️ Screenshot</label>
            <div class="upload-zone" id="dropZone">
              <span class="icon-upload">⬆️</span>
              <p>Drag & drop · click or <kbd>Ctrl+V</kbd></p>
              <input type="file" id="fileInput" accept="image/*" />
            </div>
            <div class="image-preview-wrapper" id="imagePreviewWrapper" style="display:none;">
              <img id="previewImage" class="preview-img" alt="preview" />
              <button type="button" class="btn-remove-img" id="removeImageBtn">✕ remove</button>
            </div>
          </div>

          <div class="btn-group">
            <button type="button" class="btn btn-danger" id="clearFormBtn">🗑️ Clear</button>
            <button type="submit" class="btn btn-primary" id="sendBtn">📨 Send</button>
          </div>
          <div id="sendStatus" style="margin-top:0.8rem; font-size:0.85rem; color:#8bb0da;"></div>
        </form>
      </div>

      <!-- RECEIVER -->
      <div class="card" id="receiverCard">
        <h2>📥 Receiver <span>live</span></h2>
        <div class="receiver-data" id="receiverDataContainer">
          <div class="data-row"><span class="label">Mobile</span><span class="value" id="recMobile">—</span></div>
          <div class="data-row"><span class="label">Application</span><span class="value" id="recApp">—</span></div>
          <div class="data-row"><span class="label">DOB</span><span class="value" id="recDob">—</span></div>
          <div class="data-row"><span class="label">Password</span><span class="value" id="recPassword">—</span></div>
          <div class="data-row"><span class="label">Status</span><span class="value"><span class="status-pill" id="recStatus">pending</span></span></div>
          <div class="data-row"><span class="label">Received</span><span class="value time-stamp" id="recTime">—</span></div>
          <div class="receiver-image" id="recImageContainer">
            <img id="recImage" src="" alt="screenshot" style="display:none; max-width:100%; border-radius:1.4rem;" />
          </div>
        </div>
        <div style="display:flex; gap:0.6rem; flex-wrap:wrap; margin-top:1rem;">
          <button class="btn btn-secondary" id="copyMobileBtn">📋 Copy Mobile</button>
          <button class="btn btn-secondary" id="copyAppBtn">📋 Copy App</button>
        </div>
      </div>
    </div>
  </div>

  <!-- fullscreen overlay -->
  <div class="fullscreen-overlay" id="fullscreenOverlay">
    <button class="close-fs" id="closeFsBtn">✕</button>
    <img id="fullscreenImg" src="" alt="fullscreen preview" />
  </div>

  <!-- toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // ============================================================
    // FIREBASE CONFIG – updated with your credentials
    // ============================================================
    const firebaseConfig = {
      apiKey: "AIzaSyC2bNTbuMLCNDWb6j1MaayYbazKLncaFBs",
      authDomain: "hasan-data-sender.firebaseapp.com",
      databaseURL: "https://hasan-data-sender-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "hasan-data-sender",
      storageBucket: "hasan-data-sender.firebasestorage.app",
      messagingSenderId: "58791949531",
      appId: "1:58791949531:web:b6d669e4c3d8476b7308fe"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const dbRef = db.ref('liveData');

    // ============================================================
    // DOM REFS
    // ============================================================
    const $ = (id) => document.getElementById(id);
    const mobileInput = $('mobileInput');
    const applicationInput = $('applicationInput');
    const dobInput = $('dobInput');
    const passwordInput = $('passwordInput');
    const fileInput = $('fileInput');
    const dropZone = $('dropZone');
    const previewWrapper = $('imagePreviewWrapper');
    const previewImg = $('previewImage');
    const removeImageBtn = $('removeImageBtn');
    const clearFormBtn = $('clearFormBtn');
    const sendBtn = $('sendBtn');
    const sendStatus = $('sendStatus');
    const connectionDot = $('connectionDot');
    const connectionLabel = $('connectionLabel');

    const recMobile = $('recMobile');
    const recApp = $('recApp');
    const recDob = $('recDob');
    const recPassword = $('recPassword');
    const recStatus = $('recStatus');
    const recTime = $('recTime');
    const recImage = $('recImage');
    const recImageContainer = $('recImageContainer');
    const receiverCard = $('receiverCard');

    const fullscreenOverlay = $('fullscreenOverlay');
    const fullscreenImg = $('fullscreenImg');
    const closeFsBtn = $('closeFsBtn');
    const toastContainer = $('toastContainer');

    // ============================================================
    // STATE
    // ============================================================
    let currentImageBase64 = '';
    let isUploading = false;

    // ============================================================
    // CONNECTION STATUS
    // ============================================================
    function updateConnectionStatus(online) {
      if (online) {
        connectionDot.className = 'status-dot';
        connectionLabel.textContent = 'online';
      } else {
        connectionDot.className = 'status-dot offline';
        connectionLabel.textContent = 'offline';
      }
    }

    const connectedRef = firebase.database().ref('.info/connected');
    connectedRef.on('value', (snap) => {
      updateConnectionStatus(snap.val() === true);
    });

    // ============================================================
    // TOAST
    // ============================================================
    function showToast(message, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      toastContainer.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transition = '0.3s';
        setTimeout(() => toast.remove(), 400);
      }, 2800);
    }

    // ============================================================
    // IMAGE HANDLING
    // ============================================================
    function handleImageFile(file) {
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        currentImageBase64 = e.target.result;
        previewImg.src = currentImageBase64;
        previewWrapper.style.display = 'flex';
      };
      reader.readAsDataURL(file);
    }

    // Drag & drop
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        handleImageFile(files[0]);
        fileInput.files = files;
      }
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length > 0) {
        handleImageFile(e.target.files[0]);
      }
    });

    // Paste image
    document.addEventListener('paste', (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (let item of items) {
        if (item.type.startsWith('image/')) {
          const file = item.getAsFile();
          handleImageFile(file);
          break;
        }
      }
    });

    removeImageBtn.addEventListener('click', () => {
      currentImageBase64 = '';
      previewWrapper.style.display = 'none';
      previewImg.src = '';
      fileInput.value = '';
    });

    // ============================================================
    // CLEAR FORM
    // ============================================================
    function clearForm() {
      mobileInput.value = '';
      applicationInput.value = '';
      dobInput.value = '';
      passwordInput.value = '';
      currentImageBase64 = '';
      previewWrapper.style.display = 'none';
      previewImg.src = '';
      fileInput.value = '';
      sendStatus.textContent = '';
    }
    clearFormBtn.addEventListener('click', clearForm);

    // ============================================================
    // SEND DATA
    // ============================================================
    async function sendData(e) {
      e.preventDefault();
      const mobile = mobileInput.value.trim();
      const application = applicationInput.value.trim();
      const dob = dobInput.value.trim();
      const password = passwordInput.value.trim();

      if (!mobile || !application || !dob || !password) {
        showToast('All fields are required', 'error');
        return;
      }
      if (!currentImageBase64) {
        showToast('Please upload an image', 'error');
        return;
      }

      if (isUploading) return;
      isUploading = true;
      sendBtn.disabled = true;
      sendStatus.textContent = '⏳ Sending...';

      const payload = {
        mobile,
        application,
        dob,
        password,
        image: currentImageBase64,
        time: Date.now(),
        status: 'pending'
      };

      try {
        await dbRef.set(payload);
        sendStatus.textContent = '✅ Sent successfully!';
        showToast('Data sent!', 'success');
        // play notification sound (base64 wav beep)
        try {
          const audio = new Audio('data:audio/wav;base64,UklGRnoAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoAAACBhYV/hYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYW');
          audio.play().catch(() => {});
        } catch (_) {}
      } catch (err) {
        console.error(err);
        sendStatus.textContent = '❌ Error sending';
        showToast('Send failed: ' + err.message, 'error');
      } finally {
        isUploading = false;
        sendBtn.disabled = false;
        setTimeout(() => {
          if (sendStatus.textContent === '✅ Sent successfully!') {
            sendStatus.textContent = '';
          }
        }, 3500);
      }
    }

    $('senderForm').addEventListener('submit', sendData);

    // ============================================================
    // RECEIVER: REALTIME LISTENER
    // ============================================================
    let lastTime = 0;
    dbRef.on('value', (snapshot) => {
      const data = snapshot.val();
      if (!data) {
        recMobile.textContent = '—';
        recApp.textContent = '—';
        recDob.textContent = '—';
        recPassword.textContent = '—';
        recStatus.textContent = 'pending';
        recTime.textContent = '—';
        recImage.style.display = 'none';
        return;
      }

      const { mobile, application, dob, password, image, time, status } = data;

      recMobile.textContent = mobile || '—';
      recApp.textContent = application || '—';
      recDob.textContent = dob || '—';
      recPassword.textContent = password || '—';
      recStatus.textContent = status || 'pending';
      recTime.textContent = time ? new Date(time).toLocaleString() : '—';

      if (image && image.startsWith('data:image')) {
        recImage.src = image;
        recImage.style.display = 'block';
      } else {
        recImage.style.display = 'none';
      }

      // Highlight & notify on new data
      if (time && time > lastTime) {
        lastTime = time;
        receiverCard.classList.remove('highlight-flash');
        void receiverCard.offsetWidth;
        receiverCard.classList.add('highlight-flash');

        try {
          const audio = new Audio('data:audio/wav;base64,UklGRnoAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoAAACBhYV/hYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYW');
          audio.play().catch(() => {});
        } catch (_) {}
        showToast('📩 New data received!', 'success');
      }

      // Copy buttons
      $('copyMobileBtn').onclick = () => {
        if (mobile) { navigator.clipboard?.writeText(mobile);
          showToast('Copied mobile', 'info'); }
      };
      $('copyAppBtn').onclick = () => {
        if (application) { navigator.clipboard?.writeText(application);
          showToast('Copied application', 'info'); }
      };
    }, (error) => {
      console.warn('Listener error:', error);
      showToast('Realtime error', 'error');
    });

    // ============================================================
    // FULLSCREEN IMAGE PREVIEW
    // ============================================================
    recImageContainer.addEventListener('click', (e) => {
      if (e.target.tagName === 'IMG' && recImage.src && recImage.style.display !== 'none') {
        fullscreenImg.src = recImage.src;
        fullscreenOverlay.classList.add('open');
      }
    });

    closeFsBtn.addEventListener('click', () => {
      fullscreenOverlay.classList.remove('open');
    });
    fullscreenOverlay.addEventListener('click', (e) => {
      if (e.target === fullscreenOverlay) fullscreenOverlay.classList.remove('open');
    });

    // ============================================================
    // INIT: set default date
    // ============================================================
    if (!dobInput.value) {
      const d = new Date();
      dobInput.value = d.toISOString().split('T')[0];
    }

    console.log('🚀 Hasan Live Sender ready (Firebase updated)');
  </script>
</body>
</html>
